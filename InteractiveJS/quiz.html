<!DOCTYPE html>
<html>

<head>
    <title>My Quiz</title>
    <!-- Attach your stylesheet here -->
</head>

<body>
    <h1>My Awesome Quiz</h1>
    <form id="quiz-form">
        <!-- Add your questions here -->

        <!--question 1 -->
        <label for="name">Who is the best dog?</label>
        <input type="text" id="q1" name="q1" required />
        <button type="submit" id="submit-btn">Check Answers</button>

        <!-- question 2 Radiobutton-->
        <fieldset>
            <legend>Please select your preferred contact method:</legend>
            <div>
                <input type="radio" id="q2" name="q2"/>
                <label for="contactChoice1">Email</label>

                <input type="radio" id="q2" name="q2"/>
                <label for="contactChoice2">Phone</label>

                <input type="radio" id="q2" name="q2" />
                <label for="contactChoice3">Mail</label>
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </fieldset>
    </form>
    <div id="results">
        <dl>
            <dt>Score:</dt>
            <dd id="current-score"></dd>
        </dl>
    </div>

    <!-- Attach your script here -->
    <script src="script.js" defer></script>
</body>

</html>
